name: Go Check (reusable)

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TEST_COUNT: ${{ (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')) && '5' || (github.ref == 'refs/heads/develop' || (github.event_name == 'pull_request' && github.base_ref == 'develop')) && '3' || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2

      - name: Run tests
        run: go test -v -race -count=${{ env.TEST_COUNT }} -timeout 120s ./...
